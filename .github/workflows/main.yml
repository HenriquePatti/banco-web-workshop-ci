# [ Script de Pipeline ] 
name: CI Mentoria

# [ Gatilhos ]  - quando o pipeline deve ser executado
on:
  workflow_dispatch: 

# [ declaracoes ] 
jobs:
  tests: 

    runs-on: ubuntu-latest

    env:
      API_BASE_URL: 'http://localhost:3000'
      PORT: 4000

    steps:
      - name: Clone do Projeto
        uses: actions/checkout@v4

      - name: Instalando as dependencias do projeto
        run: npm install

      - name: Iniciando servidor de mock
        run: npm run mock-server &

      - name: Iniciando servidor de aplicacao
        run: npm run server &

      - name: Executando testes do projeto
        run: npx cypress run 
        
